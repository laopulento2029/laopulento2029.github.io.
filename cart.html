<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Maxiso</title>

	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
		rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
	<link href="https://raw.githubusercontent.com/laopulento2029/laopulento2029.github.io./refs/heads/main/logo.png"
		type="image/png" rel="icon">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

	<style>
		body {
			margin: 0;
			font-family: 'DM Sans', sans-serif;
			color: var(--text);
			background: #fafbff;
			padding-top: 100px;
		}

		:root {
			--c1: #CCDCFD;
			--c2: #BBBEFE;
			--c3: #9EA3F5;
			--c4: #E8BFFB;
			--c5: #F2A5E8;
			--c6: #A8B6FF;
			--text: #1a1a1a;
			--text-light: #666;
			--shadow-sm: 0 4px 15px rgba(158, 163, 245, 0.15);
			--shadow-md: 0 10px 30px rgba(158, 163, 245, 0.2);
		}

		* {
			box-sizing: border-box;
		}

		html {
			scroll-behavior: smooth;
			scroll-padding-top: 90px;
		}

		section,
		#arrivals,
		#about-section,
		#branches,
		#products {
			scroll-margin-top: 90px;
		}

		.loading {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: linear-gradient(135deg, var(--c1), var(--c4));
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 9999;
			transition: opacity 0.5s ease;
		}

		.loading.hidden {
			opacity: 0;
			pointer-events: none;
		}

		.loader {
			width: 60px;
			height: 60px;
			border: 4px solid rgba(255, 255, 255, 0.2);
			border-top: 4px solid var(--c3);
			border-radius: 50%;
			animation: spin 1s linear infinite;
		}

		@keyframes spin {
			0% {
				transform: rotate(0deg);
			}

			100% {
				transform: rotate(360deg);
			}
		}

		.navbar {
			position: fixed;
			top: 0;
			width: 100%;
			z-index: 1000;
			background: rgba(255, 255, 255, 0.95);
			backdrop-filter: blur(20px);
			padding: 10px 5%;
			display: flex;
			align-items: center;
			justify-content: space-between;
			border-bottom: 2px solid var(--c1);
			transition: all 0.3s ease;
			box-shadow: var(--shadow-sm);
		}

		.navbar.scrolled {
			background: rgba(255, 255, 255, 0.98);
			box-shadow: var(--shadow-md);
		}

		.nav-left {
			display: flex;
			align-items: center;
			gap: 20px;
		}

		.logo {
			height: 60px;
			transition: transform 0.2s ease;
		}

		.logo:hover {
			transform: scale(1.05);
		}

		.nav-links {
			display: flex;
			gap: 10px;
			font-size: 14px;
			letter-spacing: 1px;
			text-transform: uppercase;
			font-weight: 600;
			align-items: center;
			margin: 0;
			padding: 0;
			list-style: none;
		}

		.nav-links li {
			list-style: none;
			padding: 8px 16px;
			border-radius: 20px;
			cursor: pointer;
			font-weight: 600;
			transition: all 0.2s ease;
			background: var(--c1);
		}

		.nav-links li:hover,
		.nav-links li.active {
			background: var(--c3);
			color: white;
		}

		.nav-links li a {
			text-decoration: none;
			color: inherit;
		}

		.nav-right {
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.dropdown-content {
			display: none;
			position: absolute;
			background-color: #ffffff;
			min-width: 220px;
			box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.1);
			top: 100%;
			left: 0;
			padding: 15px;
			list-style: none;
			border-radius: 12px;
			border: 1px solid #eee;
			z-index: 1001;
		}

		.dropdown:hover .dropdown-content {
			display: block;
		}

		.dropdown-content li {
			background-color: #dee2ff;
			color: #4a4a4a;
			margin: 5px;
			text-decoration: none;
			display: inline-block;
			border-radius: 50px;
			font-size: 13px;
			font-weight: 600;
			text-transform: uppercase;
			transition: all 0.3s ease;
			width: fit-content;
			white-space: nowrap;
		}

		.dropdown-content::before {
			display: none;
		}

		.search-container {
			position: relative;
			max-width: 180px;
			flex: 0 0 auto;
		}

		.search-row {
			position: relative;
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.search-feedback {
			position: absolute;
			right: 100%;
			margin-right: 15px;
			top: 50%;
			transform: translateY(-50%);
			font-size: 14px;
			color: #e11d48;
			white-space: nowrap;
			display: none;
		}

		.input-wrapper {
			position: relative;
			display: flex;
			align-items: center;
			width: 100%;
			flex-shrink: 0;
		}

		.search-input {
			width: 180px;
			min-width: 180px;
			flex-shrink: 0;
			padding: 10px 42px 10px 15px;
			border: 2px solid var(--c1);
			border-radius: 25px;
			font-size: 14px;
			background: rgba(255, 255, 255, 0.9);
			backdrop-filter: blur(10px);
			transition: all 0.2s ease;
			outline: none;
		}

		.search-btn {
			position: absolute;
			right: 12px;
			background: transparent;
			border: none;
			outline: none;
			padding: 0;
			margin: 0;
			box-shadow: none;

			display: flex;
			align-items: center;
			justify-content: center;

			cursor: pointer;
		}

		.search-btn i {
			font-size: 15px;
			color: var(--text-light);
		}

		.search-input:focus {
			border-color: var(--c3);
			box-shadow: var(--shadow-sm);
		}

		.search-icon {
			position: absolute;
			right: 14px;
			top: 50%;
			transform: translateY(-50%);
			color: var(--text-light);
			font-size: 16px;
			cursor: pointer;
			transition: color 0.2s ease;
		}

		.search-icon:hover {
			color: var(--c3);
		}

		.cart-icon {
			padding: 12px;
			border-radius: 50%;
			background: var(--c1);
			transition: all 0.2s ease;
			text-decoration: none;
			display: block;
			margin-left: 2px;
		}

		.cart-icon:hover {
			background: var(--c3);
		}

		.checkout-box {
			background: white;
			border-radius: 12px;
			padding: 25px;
			box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
		}

		.cart-items-wrapper {
			max-height: 300px;
			overflow-y: auto;
			padding-right: 5px;
			scroll-behavior: smooth;
		}

		.cart-items-wrapper::-webkit-scrollbar {
			width: 6px;
		}

		.cart-items-wrapper::-webkit-scrollbar-thumb {
			background: var(--c1);
			border-radius: 10px;
		}
	</style>

</head>

<body>
	<div class="loading" id="loading">
		<div class="loader"></div>
	</div>

	<nav class="navbar" id="navbar">
		<div class="nav-left">
			<img class="logo"
				src="https://raw.githubusercontent.com/laopulento2029/laopulento2029.github.io./refs/heads/main/logo.png"
				alt="Maxiso Logo">
			<ul class="nav-links">
				<li><a href="#home">Home</a></li>
				<li><a href="about.html">About</a></li>
				<li class="dropdown">
					<a href="#" class="dropbtn">Products <i class="fa fa-caret-down"></i></a>
					<ul class="dropdown-content">
                        <li><a href="toys.html">Toys</a></li>
                        <li><a href="lifestyle.html">Lifestyle</a></li>
                        <li><a href="electronics.html">Electronics</a></li>
                        <li><a href="bw.html">Beauty & Wellness</a></li>
                    </ul>
				</li>
			</ul>
		</div>

		<div class="nav-right">
			<div class="search-container">

				<div class="search-row">
					<div id="searchFeedback" class="search-feedback"></div>

					<form id="siteSearch" onsubmit="return handleSearch(event)">
						<div class="input-wrapper">
							<input id="searchInput" class="search-input" type="search" placeholder="Search products..."
								aria-label="Search">

							<button type="submit" class="search-btn">
								<i class="fas fa-search"></i>
							</button>
						</div>
					</form>
				</div>
				<div id="searchSuggestions" class="search-suggestions"></div>
			</div>
			<a href="cart.html" class="cart-icon">
				<img src="https://cdn-icons-png.flaticon.com/128/3144/3144456.png" alt="Cart" style="width:20px;">
			</a>
		</div>
	</nav>

	<div class="container py-5">
		<div class="row g-4">
			<div class="col-md-7">
				<div class="checkout-box">
					<h4 class="mb-4"><i class="bi bi-credit-card-2-front me-2"></i>Billing Details</h4>

					<form id="checkoutForm" action="http://52.74.133.173/cs3/checkout.php" method="POST">
						<div class="mb-3">
							<label class="form-label">Full Name</label>
							<input type="text" class="form-control" name="cust_name" required placeholder="Full Name">
						</div>
						<div class="mb-3">
							<label class="form-label">Email Address</label>
							<input type="email" class="form-control" name="cust_email" required
								placeholder="Email Address">
						</div>
						<div class="mb-3">
							<label class="form-label">Shipping Address</label>
							<textarea class="form-control" name="cust_addr" rows="3" required
								placeholder="Street, City, Province"></textarea>
						</div>

						<input type="hidden" name="cust_order" id="cust_order_input">

						<button type="submit" class="btn btn-primary w-100 py-3 mt-3"
							style="background-color: var(--c3); border: none;">
							<b>Place Order</b>
						</button>
					</form>
				</div>
			</div>

			<div class="col-md-5">
				<div class="checkout-box">
					<h4 class="mb-4"><i class="bi bi-cart3 me-2"></i>Your Cart</h4>

					<div class="cart-items-wrapper">
						<div id="cartItems"></div>
					</div>

					<hr>

					<div class="d-flex justify-content-between align-items-center">
						<h5>Total:</h5>
						<h5 id="total" style="color: var(--c3); font-weight: bold;">₱0</h5>
					</div>

					<div class="mt-3 text-center">
						<a href="index.html#products" class="text-decoration-none text-muted small">
							<i class="bi bi-arrow-left"></i> Continue Shopping
						</a>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
		document.addEventListener('DOMContentLoaded', function () {
			setTimeout(() => {
				document.getElementById('loading').classList.add('hidden');
			}, 800);
			renderCart();
		});

		function getCart() {
			return JSON.parse(localStorage.getItem("cart")) || [];
		}

		function renderCart() {
			const container = document.getElementById("cartItems");
			const totalEl = document.getElementById("total");
			const hiddenOrderInput = document.getElementById("cust_order_input");

			let cart = getCart();
			container.innerHTML = "";
			let total = 0;

			if (cart.length === 0) {
				container.innerHTML = "<div class='text-center py-4'><p class='text-muted'>Your cart is empty.</p></div>";
				totalEl.innerText = "₱0";
				hiddenOrderInput.value = "";
				return;
			}

			cart.forEach((item, index) => {
				const qty = item.quantity || 1;
				const subtotal = item.price * qty;
				total += subtotal;

				container.innerHTML += `
                    <div class="cart-item-card">
                        <div class="d-flex justify-content-between">
                            <strong>${item.name}</strong>
                            <span>₱${subtotal.toLocaleString()}</span>
                        </div>
                        <small class="text-muted">₱${item.price} x ${qty}</small>
                        <div class="mt-2">
                            <button class="btn btn-link btn-sm text-danger p-0" onclick="removeItem(${index})">
                                Remove
                            </button>
                        </div>
                    </div>
                `;
			});

			totalEl.innerText = "₱" + total.toLocaleString();

			const formattedOrder = cart.map(item => ({
				prod_name: item.name,
				prod_price: item.price
			}));

			hiddenOrderInput.value = JSON.stringify(formattedOrder);
		}

		function removeItem(index) {
			let cart = getCart();
			cart.splice(index, 1);
			localStorage.setItem("cart", JSON.stringify(cart));
			renderCart();
		}

		const pages = {
			'home': 'index.html',
			'about': 'about.html',
			'collaborations': 'index.html#collaborations',
			'cart': 'cart.html',
			'toys': 'toys.html',
			'capybara': 'toys.html',
			'cinnamoroll': 'toys.html',
			'penguin': 'toys.html',
			'cat': 'toys.html',
			'mofusand': 'toys.html',
			'chiikawa': 'toys.html',
			'keychain': 'toys.html',
			'puzzle': 'toys.html',
			'pencil': 'lifestyle.html',
			'notebook': 'lifestyle.html',
			'case': 'lifestyle.html',
			'washi': 'lifestyle.html',
			'backpack': 'lifestyle.html',
			'mug': 'lifestyle.html',
			'tape': 'lifestyle.html',
			'keyboard': 'electronics.html',
			'speaker': 'electronics.html',
			'headphones': 'electronics.html',
			'mouse': 'electronics.html',
			'fan': 'electronics.html',
			'powerbank': 'electronics.html',
			'toner': 'bw.html',
			'lipstick': 'bw.html',
			'bathbomb': 'bw.html',
			'makeup': 'bw.html',
			'perfume': 'bw.html',
			'bath': 'bw.html'
		};
		function similarity(s1, s2) {
			s1 = s1.toLowerCase();
			s2 = s2.toLowerCase();
			let longer = s1.length > s2.length ? s1 : s2;
			let shorter = s1.length > s2.length ? s2 : s1;
			if (longer.length === 0) return 1.0;
			let editDistance = levenshtein(longer, shorter);
			return (longer.length - editDistance) / parseFloat(longer.length);
		}

		function levenshtein(a, b) {
			const matrix = [];
			for (let i = 0; i <= b.length; i++) matrix[i] = [i];
			for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
			for (let i = 1; i <= b.length; i++) {
				for (let j = 1; j <= a.length; j++) {
					if (b.charAt(i - 1) === a.charAt(j - 1)) matrix[i][j] = matrix[i - 1][j - 1];
					else matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j] + 1);
				}
			}
			return matrix[b.length][a.length];
		}

		function handleSearch(event) {
			event.preventDefault();
			const query = document.getElementById('searchInput').value.toLowerCase().trim();
			const feedback = document.getElementById('searchFeedback');
			const suggestionsDiv = document.getElementById('searchSuggestions');

			feedback.style.display = 'none';
			suggestionsDiv.style.display = 'none';
			suggestionsDiv.innerHTML = '';

			for (const key in pages) {
				if (query.includes(key)) {
					window.location.href = pages[key];
					return false;
				}
			}

			const suggestions = [];
			for (const key in pages) {
				if (similarity(query, key) > 0.4) suggestions.push(key);
			}

			feedback.style.display = 'block';
			feedback.textContent = 'No results.';

			if (suggestions.length) {
				suggestionsDiv.style.display = 'block';
				suggestionsDiv.innerHTML = 'Did you mean: ' + suggestions.map(s => `<span style="background:#ffeeba;padding:2px 6px;border-radius:4px;margin-right:4px;">${s}</span>`).join('');
			}

			return false;
		}
	</script>


</body>

</html>
