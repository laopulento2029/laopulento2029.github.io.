<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxiso</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://raw.githubusercontent.com/laopulento2029/laopulento2029.github.io./refs/heads/main/logo.png"
        type="image/png" rel="icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

	<style>
		body {
			background: #f8f9fa;
		}

		:root {
			--c1: #CCDCFD;
			--c2: #BBBEFE;
			--c3: #9EA3F5;
			--c4: #E8BFFB;
			--c5: #F2A5E8;
			--c6: #A8B6FF;
			--text: #1a1a1a;
			--text-light: #666;
			--shadow-sm: 0 4px 15px rgba(158, 163, 245, 0.15);
			--shadow-md: 0 10px 30px rgba(158, 163, 245, 0.2);
		}

		* {
			box-sizing: border-box;
		}

		html {
			scroll-behavior: smooth;
			scroll-padding-top: 90px;
		}

		section,
		#arrivals,
		#about-section,
		#branches,
		#products {
			scroll-margin-top: 90px;
		}

		body {
			margin: 0;
			font-family: 'DM Sans', sans-serif;
			color: var(--text);
			overflow-x: hidden;
			background: #fafbff;
		}

		.loading {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: linear-gradient(135deg, var(--c1), var(--c4));
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 9999;
			transition: opacity 0.5s ease;
		}

		.loading.hidden {
			opacity: 0;
			pointer-events: none;
		}

		.loader {
			width: 60px;
			height: 60px;
			border: 4px solid rgba(255, 255, 255, 0.2);
			border-top: 4px solid var(--c3);
			border-radius: 50%;
			animation: spin 1s linear infinite;
		}

		@keyframes spin {
			0% {
				transform: rotate(0deg);
			}

			100% {
				transform: rotate(360deg);
			}
		}

		.navbar {
			position: fixed;
			top: 0;
			width: 100%;
			z-index: 1000;
			background: rgba(255, 255, 255, 0.95);
			backdrop-filter: blur(20px);
			padding: 10px 5%;
			display: flex;
			align-items: center;
			justify-content: space-between;
			border-bottom: 2px solid var(--c1);
			transition: all 0.3s ease;
			box-shadow: var(--shadow-sm);
		}

		.navbar.scrolled {
			background: rgba(255, 255, 255, 0.98);
			box-shadow: var(--shadow-md);
		}

		.nav-left {
			display: flex;
			align-items: center;
			gap: 20px;
		}

		.logo {
			height: 60px;
			transition: transform 0.2s ease;
		}

		.logo:hover {
			transform: scale(1.05);
		}

		.nav-links {
			display: flex;
			gap: 10px;
			font-size: 14px;
			letter-spacing: 1px;
			text-transform: uppercase;
			font-weight: 600;
			align-items: center;
		}

		.nav-links li {
			list-style: none;
			padding: 8px 16px;
			border-radius: 20px;
			cursor: pointer;
			font-weight: 600;
			transition: all 0.2s ease;
			background: var(--c1);
		}

		.nav-links li:hover,
		.nav-links li.active {
			background: var(--c3);
			color: white;
		}

		.nav-links li a {
			text-decoration: none;
			color: inherit;
		}

		.nav-right {
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.search-container {
			position: relative;
			max-width: 250px;
		}

		.search-input {
			width: 100%;
			padding: 10px 40px 10px 15px;
			border: 2px solid var(--c1);
			border-radius: 25px;
			font-size: 14px;
			background: rgba(255, 255, 255, 0.9);
			backdrop-filter: blur(10px);
			transition: all 0.2s ease;
			outline: none;
		}

		.search-input:focus {
			border-color: var(--c3);
			box-shadow: var(--shadow-sm);
		}

		.search-icon {
			position: absolute;
			right: 12px;
			top: 50%;
			transform: translateY(-50%);
			color: var(--text-light);
			font-size: 16px;
			cursor: pointer;
			transition: color 0.2s ease;
		}

		.search-icon:hover {
			color: var(--c3);
		}

		.cart-icon {
			padding: 12px;
			border-radius: 50%;
			background: var(--c1);
			transition: all 0.2s ease;
			text-decoration: none;
			display: block;
		}

		.cart-icon:hover {
			background: var(--c3);
		}

		.checkout-box {
			background: white;
			border-radius: 12px;
			padding: 25px;
			box-shadow: 0 10px 25px color(black)
		}
	</style>

</head>

<body>
	<div class="loading" id="loading">
		<div class="loader"></div>
	</div>

	<nav class="navbar" id="navbar">
		<div class="nav-left">
			<img class="logo"
				src="https://raw.githubusercontent.com/laopulento2029/laopulento2029.github.io./refs/heads/main/logo.png"
				alt="Maxiso Logo">
			<ul class="nav-links">
				<li><a href="#home">Home</a></li>
				<li><a href="#products">Products</a></li>
				<li><a href="#arrivals">Collaborations</a></li>
				<li><a href="#about-section">Team</a></li>
				<li><a href="#branches">Branches</a></li>
			</ul>
		</div>

		<div class="nav-right">
			<div class="search-container">
				<form id="siteSearch" class="d-flex" onsubmit="return handleSearch(event)">
					<input id="searchInput" class="form-control me-2" type="search" placeholder="Search..."
						aria-label="Search">
					<button class="btn btn-outline-success" type="submit">Search</button>
				</form>

				<div id="searchFeedback" class="mx-2 text-danger" style="display:none;"></div>
				<div id="searchSuggestions" class="mx-1" style="display:none;"> </div>
				<i class="fas fa-search search-icon" id="searchIcon"></i>
			</div>
			<a href="https://your-cart-link.com" class="cart-icon">
				<img src="https://cdn-icons-png.flaticon.com/128/3144/3144456.png" alt="Cart" style="width:20px;">
			</a>
		</div>
	</nav>

	<div class="container py-5">
		<div class="row g-4">


			<div class="col-md-7">
				<div class="checkout-box">
					<h4>Billing Details</h4>

					<form id="checkoutForm">
						<input class="form-control mb-3" placeholder="Full Name" required>
						<input class="form-control mb-3" placeholder="Email" required>
						<input class="form-control mb-3" placeholder="Address" required>

						<button class="btn btn-dark w-100 mt-3">Place Order</button>
					</form>
				</div>
			</div>


			<div class="col-md-5">
				<div class="checkout-box">
					<h4>Your Cart</h4>

					<div id="cartItems"></div>

					<hr>

					<h5>Total: <span id="total">$0</span></h5>
				</div>
			</div>

		</div>
	</div>

	<script>

		document.addEventListener('DOMContentLoaded', function () {
			setTimeout(() => {
				document.getElementById('loading').classList.add('hidden');
			}, 1500);

			window.addEventListener('scroll', () => {
				const navbar = document.getElementById('navbar');
				if (window.scrollY > 50) {
					navbar.classList.add('scrolled');
				} else {
					navbar.classList.remove('scrolled');
				}
			});

			document.querySelectorAll('a[href^="#"]').forEach(anchor => {
				anchor.addEventListener('click', function (e) {
					e.preventDefault();
					const target = document.querySelector(this.getAttribute('href'));
					if (target) {
						target.scrollIntoView({
							behavior: 'smooth',
							block: 'start'
						});
					}
				});
			});

			function setActiveNavLink() {
				const navLinks = document.querySelectorAll('.nav-links li');
				const sections = ['#about-section', '#branches'];

				sections.forEach(section => {
					const targetSection = document.querySelector(section);
					if (targetSection) {
						const rect = targetSection.getBoundingClientRect();
						if (rect.top <= 90 && rect.bottom >= 90) {
							navLinks.forEach(link => link.classList.remove('active'));
							const activeLink = Array.from(navLinks).find(link =>
								link.querySelector('a')?.getAttribute('href') === section
							);
							if (activeLink) {
								activeLink.classList.add('active');
							}
						}
					}
				});
			}

			window.addEventListener('scroll', setActiveNavLink);
			setActiveNavLink();
		});

		function getCart() {
			return JSON.parse(localStorage.getItem("cart")) || [];
		}

		function renderCart() {
			const container = document.getElementById("cartItems");
			const totalEl = document.getElementById("total");

			let cart = getCart();

			container.innerHTML = "";

			let total = 0;

			if (cart.length === 0) {
				container.innerHTML = "<p>Your cart is empty.</p>";
				totalEl.innerText = "₱0";
				return;
			}

			cart.forEach((item, index) => {

				const subtotal = item.price * item.quantity;
				total += subtotal;

				container.innerHTML += `
      <div class="card mb-3 p-3">
        <h5>${item.name}</h5>
        <p>Price: ₱${item.price}</p>
        <p>Quantity: ${item.quantity}</p>
        <p><b>Subtotal: ₱${subtotal}</b></p>

        <button class="btn btn-danger btn-sm" onclick="removeItem(${index})">
          Remove
        </button>
      </div>
    `;
			});

			totalEl.innerText = "₱" + total;
		}

		function removeItem(index) {
			let cart = getCart();
			cart.splice(index, 1);
			localStorage.setItem("cart", JSON.stringify(cart));
			renderCart();
		}

		renderCart();

		const pages = {
			'home': '#home',
			'products': '#products',
			'collaborations': '#arrivals',
			'team': '#about-section',
			'branches': '#branches'
		};
		function similarity(s1, s2) {
			s1 = s1.toLowerCase();
			s2 = s2.toLowerCase();
			let longer = s1.length > s2.length ? s1 : s2;
			let shorter = s1.length > s2.length ? s2 : s1;
			if (longer.length === 0) return 1.0;
			let editDistance = levenshtein(longer, shorter);
			return (longer.length - editDistance) / parseFloat(longer.length);
		}

		function levenshtein(a, b) {
			const matrix = [];
			for (let i = 0; i <= b.length; i++) matrix[i] = [i];
			for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
			for (let i = 1; i <= b.length; i++) {
				for (let j = 1; j <= a.length; j++) {
					if (b.charAt(i - 1) === a.charAt(j - 1)) matrix[i][j] = matrix[i - 1][j - 1];
					else matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j] + 1);
				}
			}
			return matrix[b.length][a.length];
		}

		function handleSearch(event) {
			event.preventDefault();
			const query = document.getElementById('searchInput').value.toLowerCase().trim();
			const feedback = document.getElementById('searchFeedback');
			const suggestionsDiv = document.getElementById('searchSuggestions');

			feedback.style.display = 'none';
			suggestionsDiv.style.display = 'none';
			suggestionsDiv.innerHTML = '';

			for (const key in pages) {
				if (query.includes(key)) {
					window.location.href = pages[key];
					return false;
				}
			}

			const suggestions = [];
			for (const key in pages) {
				if (similarity(query, key) > 0.4) suggestions.push(key);
			}

			feedback.style.display = 'block';
			feedback.textContent = 'No results.';

			if (suggestions.length) {
				suggestionsDiv.style.display = 'block';
				suggestionsDiv.innerHTML = 'Did you mean: ' + suggestions.map(s => `<span style="background:#ffeeba;padding:2px 6px;border-radius:4px;margin-right:4px;">${s}</span>`).join('');
			}

			return false;
		}
	</script>


</body>

</html>
