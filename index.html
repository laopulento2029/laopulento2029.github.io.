<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxiso</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://raw.githubusercontent.com/laopulento2029/laopulento2029.github.io./refs/heads/main/logo.png"
        type="image/png" rel="icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>


    <style>
        :root {
            --c1: #CCDCFD;
            --c2: #BBBEFE;
            --c3: #9EA3F5;
            --c4: #E8BFFB;
            --c5: #F2A5E8;
            --c6: #A8B6FF;
            --text: #1a1a1a;
            --text-light: #666;
            --shadow-sm: 0 4px 15px rgba(158, 163, 245, 0.15);
            --shadow-md: 0 10px 30px rgba(158, 163, 245, 0.2);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: 90px;
        }

        section,
        #arrivals,
        #about-section,
        #branches,
        #products {
            scroll-margin-top: 90px;
        }

        body {
            margin: 0;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            overflow-x: hidden;
            background: #fafbff;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--c1), var(--c4));
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid var(--c3);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 10px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--c1);
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .navbar.scrolled {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: var(--shadow-md);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            height: 60px;
            transition: transform 0.2s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .nav-links {
            display: flex;
            gap: 10px;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 600;
            align-items: center;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .nav-links li {
            list-style: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            background: var(--c1);
        }

        .nav-links li:hover,
        .nav-links li.active {
            background: var(--c3);
            color: white;
        }

        .nav-links li a {
            text-decoration: none;
            color: inherit;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #ffffff;
            min-width: 220px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.1);
            top: 100%;
            left: 0;
            padding: 15px;
            list-style: none;
            border-radius: 12px;
            border: 1px solid #eee;
            z-index: 1001;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown-content li {
            background-color: #dee2ff;
            color: #4a4a4a;
            margin: 5px;
            text-decoration: none;
            display: inline-block;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.3s ease;
            width: fit-content;
            white-space: nowrap;
        }

        .dropdown-content::before {
            display: none;
        }

        .search-container {
            position: relative;
            max-width: 180px;
            flex: 0 0 auto;
        }

        .search-row {
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-feedback {
            position: absolute;
            right: 100%;
            margin-right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: #e11d48;
            white-space: nowrap;
            display: none;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            flex-shrink: 0;
        }

        .search-input {
            width: 180px;
            min-width: 180px;
            flex-shrink: 0;
            padding: 10px 42px 10px 15px;
            border: 2px solid var(--c1);
            border-radius: 25px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
            outline: none;
        }

        .search-btn {
            position: absolute;
            right: 12px;
            background: transparent;
            border: none;
            outline: none;
            padding: 0;
            margin: 0;
            box-shadow: none;

            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;
        }

        .search-btn i {
            font-size: 15px;
            color: var(--text-light);
        }

        .search-input:focus {
            border-color: var(--c3);
            box-shadow: var(--shadow-sm);
        }

        .search-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 16px;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .search-icon:hover {
            color: var(--c3);
        }

        .cart-icon {
            padding: 12px;
            border-radius: 50%;
            background: var(--c1);
            transition: all 0.2s ease;
            text-decoration: none;
            display: block;
            margin-left: 2px;
        }

        .cart-icon:hover {
            background: var(--c3);
        }

        .hero {
            position: relative;
            height: 100vh;
            min-height: 600px;
            overflow: hidden;
        }

        .hero-slider {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.8s ease;
        }

        .hero-slider img {
            width: 100%;
            height: 100vh;
            min-height: 600px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .hero-text {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 100px 80px;
            z-index: 3;
        }

        .hero-text h1 {
            font-size: clamp(48px, 8vw, 72px);
            margin: 0 0 25px 0;
            font-weight: 700;
            line-height: 1.1;
            background: linear-gradient(135deg, white 0%, rgba(255, 255, 255, 0.9) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-text em {
            color: var(--c5);
            font-style: normal;
            font-weight: 700;
        }

        .shop-btn {
            width: fit-content;
            padding: 18px 42px;
            background: var(--c3);
            color: #fff;
            text-decoration: none;
            margin-top: 25px;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .shop-btn:hover {
            background: var(--c5);
            transform: translateY(-3px);
        }

        .products-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 40px;
            font-weight: 700;
            color: var(--c3);
            position: relative;
        }

        .products-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: var(--c3);
            border-radius: 2px;
        }

        .best {
            padding: 60px 40px;
            position: relative;
        }

        .best::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: var(--c3);
        }

        .best-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .best-head h2 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--c3);
        }

        .best-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 50px 30px;
            text-align: center;
            border: 1px solid var(--c2);
            border-radius: 25px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .best-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-md);
        }

        .section {
            max-width: 1400px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .section h2 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 700;
            color: var(--c3);
            position: relative;
        }

        .section h2::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: var(--c3);
            border-radius: 2px;
        }

        .collabs-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            overflow: hidden;
        }

        .collabs-slider {
            display: flex;
            width: 100%;
            height: 650px;
            transition: transform 0.8s ease;
        }

        .collab-slide {
            min-width: 100%;
            height: 650px;
            position: relative;
            flex-shrink: 0;
        }

        .collab-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 25px;
        }

        .collab-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            color: white;
            padding: 50px 40px 40px;
            border-radius: 0 0 25px 25px;
        }

        .collab-brand {
            font-size: 2.8rem;
            font-weight: 700;
            margin: 0 0 12px 0;
        }

        .collab-tag {
            font-size: 1.3rem;
            opacity: 0.9;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .collab-tag i {
            color: var(--c5);
            font-size: 1.4rem;
        }
    </style>
</head>

<body>
    <div class="loading" id="loading">
        <div class="loader"></div>
    </div>

    <nav class="navbar" id="navbar">
        <div class="nav-left">
            <img class="logo"
                src="https://raw.githubusercontent.com/laopulento2029/laopulento2029.github.io./refs/heads/main/logo.png"
                alt="Maxiso Logo">
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#collaborations">Collaborations</a></li>
                <li><a href="about.html">About</a></li>
                <li class="dropdown">
                    <a href="#" class="dropbtn">Products <i class="fa fa-caret-down"></i></a>
                    <ul class="dropdown-content">
                        <li><a href="toys.html">Toys</a></li>
                        <li><a href="lifestyle.html">Lifestyle</a></li>
                        <li><a href="electronics.html">Electronics</a></li>
                        <li><a href="bw.html">Beauty & Wellness</a></li>
                    </ul>
                </li>
            </ul>
        </div>

        <div class="nav-right">
            <div class="search-container">

                <div class="search-row">
                    <div id="searchFeedback" class="search-feedback"></div>

                    <form id="siteSearch" onsubmit="return handleSearch(event)">
                        <div class="input-wrapper">
                            <input id="searchInput" class="search-input" type="search" placeholder="Search products..."
                                aria-label="Search">

                            <button type="submit" class="search-btn">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                    </form>
                </div>
                <div id="searchSuggestions" class="search-suggestions"></div>
            </div>
            <a href="cart.html" class="cart-icon">
                <img src="https://cdn-icons-png.flaticon.com/128/3144/3144456.png" alt="Cart" style="width:20px;">
            </a>
        </div>
    </nav>

    <header class="hero" id="home">
        <div class="hero-slider" id="slider">
            <img src="https://s.hdnux.com/photos/01/40/57/71/25362025/7/rawImage.jpg" alt="Hero 1">
            <img src="https://raw.githubusercontent.com/laopulento2029/laopulento2029.github.io./refs/heads/main/miniso.jpg"
                alt="Hero 2">
            <img src="https://jingdaily.com/_next/image?url=https%3A%2F%2Fcdn.sanity.io%2Fimages%2Ff8lauh0h%2Fproduction%2F3b93bfa3f0d2f6dc601d77c0ab122f3c0329793f-1920x1280.jpg%3Fq%3D95%26fit%3Dmax%26auto%3Dformat&w=3840&q=95"
                alt="Hero 3">
        </div>

        <div class="hero-text">
            <h1>Fun is<br>for <em>Life!</em></h1>
            <a href="checkout.html" class="shop-btn">SHOP NOW <i class="fas fa-arrow-right"></i></a>
        </div>
    </header>

    <div class="section">
        <h2 id="collaborations">Latest Collaborations</h2>

        <div class="collabs-container">
            <div class="collabs-slider" id="collabsSlider">
                <div class="collab-slide">
                    <img src="https://www.miniso.com/vancheerfile/images/2024/10/20241010144528802.png"
                        alt="Harry Potter Collab">
                    <div class="collab-info">
                        <h3 class="collab-brand">Harry Potter</h3>
                        <p class="collab-tag"><i class="fas fa-star"></i>Harry Potter Set</p>
                    </div>
                </div>
                <div class="collab-slide">
                    <img src="https://www.miniso.com/vancheerfile/images/2024/8/2024082009235934.jpg"
                        alt="Snoopy Collab">
                    <div class="collab-info">
                        <h3 class="collab-brand">Snoopy</h3>
                        <p class="collab-tag"><i class="fas fa-magic"></i>Snoopy Set</p>
                    </div>
                </div>
                <div class="collab-slide">
                    <img src="https://www.miniso.com/vancheerfile/images/2024/8/2024082009257529.jpg" alt="BT21 Collab">
                    <div class="collab-info">
                        <h3 class="collab-brand">BT21</h3>
                        <p class="collab-tag"><i class="fas fa-heart"></i>BT21 Set</p>
                    </div>
                </div>
                <div class="collab-slide">
                    <img src="https://www.miniso.com/vancheerfile/images/2024/8/20240819141717931.png"
                        alt="Loopy Collab">
                    <div class="collab-info">
                        <h3 class="collab-brand">Loopy</h3>
                        <p class="collab-tag"><i class="fas fa-bolt"></i>Loopy Set</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1500);

            window.addEventListener('scroll', () => {
                const navbar = document.getElementById('navbar');
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });

            let heroIndex = 0;
            const heroSlider = document.getElementById("slider");
            const totalHero = heroSlider.children.length;

            setInterval(() => {
                heroIndex = (heroIndex + 1) % totalHero;
                heroSlider.style.transform = `translateX(-${heroIndex * 100}%)`;
            }, 4000);

            let collabIndex = 0;
            const collabsSlider = document.getElementById("collabsSlider");
            const totalCollabs = collabsSlider.children.length;

            setInterval(() => {
                collabIndex = (collabIndex + 1) % totalCollabs;
                collabsSlider.style.transform = `translateX(-${collabIndex * 100}%)`;
            }, 5000);

            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });

            function setActiveNavLink() {
                const navLinks = document.querySelectorAll('.nav-links li');
                const sections = ['#home', '#products', '#arrivals', '#about-section', '#branches'];

                sections.forEach(section => {
                    const targetSection = document.querySelector(section);
                    if (targetSection) {
                        const rect = targetSection.getBoundingClientRect();
                        if (rect.top <= 90 && rect.bottom >= 90) {
                            navLinks.forEach(link => link.classList.remove('active'));
                            const activeLink = Array.from(navLinks).find(link =>
                                link.querySelector('a')?.getAttribute('href') === section
                            );
                            if (activeLink) {
                                activeLink.classList.add('active');
                            }
                        }
                    }
                });
            }

            window.addEventListener('scroll', setActiveNavLink);
            setActiveNavLink();
        });

        const pages = {
            'home': 'index.html',
            'about': 'about.html',
            'collaborations': 'index.html#collaborations',
            'cart': 'cart.html',
            'toys': 'toys.html',
            'capybara': 'toys.html',
            'cinnamoroll': 'toys.html',
            'penguin': 'toys.html',
            'cat': 'toys.html',
            'mofusand': 'toys.html',
            'chiikawa': 'toys.html',
            'keychain': 'toys.html',
            'puzzle': 'toys.html',
            'pencil': 'lifestyle.html',
            'notebook': 'lifestyle.html',
            'case': 'lifestyle.html',
            'washi': 'lifestyle.html',
            'backpack': 'lifestyle.html',
            'mug': 'lifestyle.html',
            'tape': 'lifestyle.html',
            'keyboard': 'electronics.html',
            'speaker': 'electronics.html',
            'headphones': 'electronics.html',
            'mouse': 'electronics.html',
            'fan': 'electronics.html',
            'powerbank': 'electronics.html',
            'toner': 'bw.html',
            'lipstick': 'bw.html',
            'bathbomb': 'bw.html',
            'makeup': 'bw.html',
            'perfume': 'bw.html',
            'bath': 'bw.html'
        };
        function similarity(s1, s2) {
            s1 = s1.toLowerCase();
            s2 = s2.toLowerCase();
            let longer = s1.length > s2.length ? s1 : s2;
            let shorter = s1.length > s2.length ? s2 : s1;
            if (longer.length === 0) return 1.0;
            let editDistance = levenshtein(longer, shorter);
            return (longer.length - editDistance) / parseFloat(longer.length);
        }

        function levenshtein(a, b) {
            const matrix = [];
            for (let i = 0; i <= b.length; i++) matrix[i] = [i];
            for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) matrix[i][j] = matrix[i - 1][j - 1];
                    else matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j] + 1);
                }
            }
            return matrix[b.length][a.length];
        }

        function handleSearch(event) {
            event.preventDefault();
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const feedback = document.getElementById('searchFeedback');

            feedback.style.display = 'none';

            for (const key in pages) {
                if (query.includes(key)) {
                    window.location.href = pages[key];
                    return false;
                }
            }

            const suggestions = [];
            for (const key in pages) {
                if (similarity(query, key) > 0.4) suggestions.push(key);
            }

            feedback.style.display = 'block';

            if (suggestions.length > 0) {
                feedback.style.color = '#1a1a1a';
                feedback.innerHTML = 'Did you mean: ' + suggestions.map(s =>
                    `<span style="background:var(--c4); padding:2px 8px; border-radius:10px; margin-left:4px; cursor:pointer;" onclick="document.getElementById('searchInput').value='${s}'; document.getElementById('siteSearch').dispatchEvent(new Event('submit'));">${s}</span>`
                ).join('');
            } else {
                feedback.style.color = '#e11d48';
                feedback.textContent = 'No results.';
            }

            return false;
        }
    </script>

</body>

</html>
